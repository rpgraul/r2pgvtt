[build]
  command = "cd public && npm install && chmod +x node_modules/.bin/vite && npm run build"
  publish = "public/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "assets/dice-box/**"
  [headers.values]
    Content-Type = "application/wasm"
    Access-Control-Allow-Origin = "*"
