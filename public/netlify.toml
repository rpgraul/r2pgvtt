[build]
  command = "npm install && npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".svelte-kit,dist,.firebaserc"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "assets/dice-box/**"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/wasm"